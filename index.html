<!DOCTYPE html>
<html lang="lg">
<head>
<meta charset="UTF-8">
<title>Streets of Uganda</title>
<style>
body { margin:0; background:black; color:white; text-align:center; font-family:Arial; }
canvas { background:#111; display:block; margin:auto; }
button { padding:10px; margin:5px; font-size:16px; }
</style>
</head>
<body>

<h1>🚗 Streets of Uganda</h1>
<button onclick="startGame()">▶️ Tandika</button>
<h3>💰 Coins: <span id="coins">0</span></h3>

<canvas id="game" width="400" height="600"></canvas>

<h2>Dduuka ly’abavuganyi</h2>
<div id="shop"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning = false;
let speed = 3;
let coins = 0;

// 🎵 MUSIC
const music = {
  racing: new Audio("music/racing.mp3"),
  night: new Audio("music/night.mp3"),
  chaos: new Audio("music/chaos.mp3")
};

function playMusic(type){
  for(let m in music){
    music[m].pause();
    music[m].currentTime = 0;
  }
  music[type].loop = true;
  music[type].play();
}

// 🚗 PLAYER
let player = { x:180, y:500, w:40, h:60 };

// 🚧 OBSTACLES
let obstacles = [];

// 🌍 ROAD ANIMATION
let roadOffset = 0;

// 🛣️ DRAW ROAD
function drawRoad(){
  ctx.fillStyle = "#333";
  ctx.fillRect(0,0,400,600);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.setLineDash([20,20]);

  for(let i = -40; i < 600; i += 40){
    ctx.beginPath();
    ctx.moveTo(200, i + roadOffset);
    ctx.lineTo(200, i + 20 + roadOffset);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

// 🚗 DRAW PLAYER
function drawPlayer(){
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, 40, 60);

  ctx.fillStyle = "lightblue";
  ctx.fillRect(player.x+5, player.y+10, 30, 20);
}

// 🚧 DRAW OBSTACLES
function drawObstacle(o){
  if(o.type==="car") ctx.fillStyle="blue";
  else if(o.type==="taxi") ctx.fillStyle="yellow";
  else if(o.type==="boda") ctx.fillStyle="green";
  else ctx.fillStyle="orange";

  ctx.fillRect(o.x,o.y,40,60);
}

// 🎮 CONTROLS
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") player.x-=20;
  if(e.key==="ArrowRight") player.x+=20;
});

// 📱 TOUCH
canvas.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;
  if(x < window.innerWidth/2) player.x -= 30;
  else player.x += 30;
});

// 🚧 SPAWN
function spawnObstacle(){
  let types = ["car","taxi","boda","tuktuk"];
  obstacles.push({
    x: Math.random()*360,
    y: -60,
    type: types[Math.floor(Math.random()*types.length)]
  });
}

// 🌍 ROADS
let roads = ["Kampala","Entebbe Road","Entebbe Highway","Jinja","Mbale"];
let currentRoad = 0;

function changeRoad(){
  currentRoad++;
  if(currentRoad>=roads.length) currentRoad=0;

  let r = roads[currentRoad];

  if(r==="Entebbe Highway"){
    speed = 7;
    playMusic("night");
    alert("⚡ Oli ku Entebbe Highway!");
  }
  else if(r==="Entebbe Road"){
    speed = 5;
    alert("📍 Oli ku luguudo lw’e Entebbe");
  }
  else if(r==="Kampala"){
    speed = 3;
    playMusic("chaos");
  }
  else if(r==="Jinja"){
    speed = 4;
  }
  else if(r==="Mbale"){
    speed = 5;
  }
}

// 🧠 RACERS
let racers = [
  {name:"Omah",price:0,owned:true},
  {name:"Emma",price:100,owned:false},
  {name:"Ashbelz",price:200,owned:false},
  {name:"KuniRanks",price:300,owned:false},
  {name:"DND Bush",price:400,owned:false},
  {name:"Oinam",price:500,owned:false},
  {name:"KingKong",price:700,owned:false},
  {name:"Geno",price:1000,owned:false}
];

function buyRacer(i){
  let r = racers[i];

  if(r.owned){
    alert("Ono omulina dda!");
    return;
  }

  if(coins>=r.price){
    coins-=r.price;
    r.owned=true;
    alert("Oguze "+r.name+"!");
    updateCoins();
    renderShop();
  } else {
    alert("Obusente tebimala!");
  }
}

function renderShop(){
  let shop = document.getElementById("shop");
  shop.innerHTML = "";

  racers.forEach((r,i)=>{
    let btn = document.createElement("button");

    btn.innerText = r.owned 
      ? r.name + " ✅" 
      : r.name + " - " + r.price + "🪙";

    btn.onclick = ()=>buyRacer(i);

    shop.appendChild(btn);
  });
}

function updateCoins(){
  document.getElementById("coins").innerText = Math.floor(coins);
}

// 🚀 START
function startGame(){
  gameRunning = true;
  playMusic("racing");
  setInterval(gameLoop,20);
  setInterval(spawnObstacle,1000);
  setInterval(changeRoad,15000);
}

// 🎮 LOOP
function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,400,600);

  // road animation
  roadOffset += speed;
  if(roadOffset > 40) roadOffset = 0;

  drawRoad();
  drawPlayer();

  obstacles.forEach(o=>{
    o.y += speed;
    drawObstacle(o);

    if(o.y>480 && o.x<player.x+40 && o.x+40>player.x){
      alert("💥 Obodde!");
      location.reload();
    }
  });

  coins += 0.05;
  updateCoins();

  if(Math.random()<0.002) playMusic("chaos");
  if(Math.random()<0.001) playMusic("night");
}

renderShop();
</script>

</body>
</html>
