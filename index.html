<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashmediaboost</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-content">
    <div class="logo-circle">A</div>
    <h1>Ashmediaboost</h1>
    <div class="loader-bar"></div>
  </div>
</div>

<!-- TOP BAR -->
<div id="topBar" class="top-bar"></div>

<!-- HERO -->
<header class="hero">
<h1>Ashmediaboost 🚀</h1>
<p id="liveUsers"></p>
<button onclick="scrollToOrder()">🔥 Order Now</button>
<button id="installBtn" style="display:none;">📲 Download App</button>
</header>

<!-- PLATFORMS -->
<div class="platforms">

<div class="platform-card active" onclick="selectPlatform(this,'instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<p>Instagram</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'tiktok')">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<p>TikTok</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'facebook')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
<p>Facebook</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
<p>YouTube</p>
</div>

</div>

<!-- ORDER -->
<section class="order" id="order">

<select id="type" onchange="updateServiceOptions()">
<option value="">Select Service</option>
<option value="followers">Followers</option>
<option value="likes">Likes</option>
<option value="views">Views</option>
<option value="comments">Comments</option>
<option value="subscribers">Subscribers</option>
</select>

<div id="serviceOptions"></div>

<input id="link" placeholder="Paste link">
<input id="quantity" type="number" placeholder="Min 10" min="10">

<p id="price">Total: 0 UGX</p>
<p id="progress">🏆 0/7 orders</p>

<button onclick="confirmOrder()">🔥 Order via WhatsApp</button>

</section>

<audio id="appSound" src="tap.mp3"></audio>

<script src="script.js"></script>
</body>
  </html>
