<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashmediaboost</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="logo">🚀 AshMedia<span>boost</span></div>
  <p>Loading...</p>
</div>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="logo-nav">🚀 Ashboost</div>
  <button onclick="scrollToOrder()">Order</button>
</div>

<!-- TOP BAR -->
<div id="topBar" class="top-bar"></div>

<!-- ANNOUNCEMENT -->
<div class="announcement">
🏆 Complete 7 orders this week & WIN rewards 🎁
</div>

<!-- HERO -->
<header class="hero">
  <div class="logo">🚀 AshMedia<span>boost</span></div>
  <p id="liveUsers"></p>
  <button onclick="scrollToOrder()">🔥 Start Growth</button>
</header>

<!-- JOIN CHANNEL -->
<section class="join">
  <p>📢 Join our WhatsApp Channel</p>
  <a href="https://whatsapp.com/channel/0029VbCSFDCBadmaR5Memh16" target="_blank" class="join-btn">Join Channel</a>
</section>

<!-- ORDER -->
<section id="orderSection" class="order">

<select id="currency" onchange="changeCurrency()">
<option value="UGX">UGX</option>
<option value="KES">KES</option>
<option value="NGN">NGN</option>
<option value="USD">USD</option>
</select>

<div class="platforms">
  <div class="platform-card active" onclick="selectPlatform(this,'instagram')">📸 Instagram</div>
  <div class="platform-card" onclick="selectPlatform(this,'tiktok')">🎵 TikTok</div>
  <div class="platform-card" onclick="selectPlatform(this,'facebook')">📘 Facebook</div>
  <div class="platform-card" onclick="selectPlatform(this,'youtube')">▶️ YouTube</div>
</div>

<select id="type" onchange="updateServiceOptions()">
<option value="">Select Service</option>
<option value="followers">Audience Growth</option>
<option value="likes">Engagement Boost</option>
<option value="views">Reach Amplifier</option>
</select>

<div id="serviceOptions"></div>

<input id="link" placeholder="Paste link">
<input id="quantity" type="number" placeholder="Quantity">

<p id="price">Total: 0</p>

<button onclick="confirmOrder()">🔥 Order via WhatsApp</button>

</section>

<!-- REFER -->
<div class="refer-box">
<h3>🎁 Refer & Earn</h3>
<p id="refCode"></p>
<button onclick="shareReferral()">Share</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<button onclick="scrollToOrder()">Order</button>
<button onclick="openWhatsApp()">Chat</button>
</div>

<script src="script.js"></script>
</body>
</html>
