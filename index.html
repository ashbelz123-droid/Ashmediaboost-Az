<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ash Media Boost</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <h1>Ash Media Boost 🚀</h1>
  <p>Grow Faster • Trusted • Instant Delivery</p>

  <div class="badges">
    <span>🔒 Secure</span>
    <span>💬 WhatsApp Support</span>
    <span>⚡ Fast</span>
  </div>

  <p class="limited">⚡ Limited slots today</p>
  <p id="liveUsers" class="live-users"></p>

  <button onclick="scrollToOrder()">Start Order</button>
</header>

<section class="order" id="order">
  <h2>Place Your Order</h2>

  <select id="platform">
    <option value="instagram">📸 Instagram</option>
    <option value="tiktok">🎵 TikTok</option>
    <option value="youtube">▶️ YouTube</option>
  </select>

  <select id="type" onchange="updateServiceOptions()">
    <option value="">Select Service</option>
    <option value="followers">👥 Followers</option>
    <option value="likes">❤️ Likes</option>
    <option value="views">👁️ Views</option>
    <option value="comments">💬 Comments</option>
  </select>

  <!-- Dynamic options -->
  <div id="serviceOptions"></div>

  <input type="text" id="link" placeholder="Paste your link">
  <input type="number" id="quantity" placeholder="Enter quantity">

  <p id="price">Total: 0 UGX</p>

  <button onclick="placeOrder()">🔥 Order via WhatsApp</button>

  <p class="after-order">We guide payment after order via WhatsApp</p>
</section>

<div id="popup" class="popup"></div>

<script src="script.js"></script>
</body>
</html>
