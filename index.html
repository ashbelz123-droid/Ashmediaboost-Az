<!DOCTYPE html>
<html lang="lg">
<head>
<meta charset="UTF-8">
<title>Streets of Uganda</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🎮 MENU */
#menu {
  position:absolute;
  width:100%;
  height:100vh;
  background:linear-gradient(black,#222);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#menu h1 {
  font-size:32px;
  margin-bottom:20px;
}

#menu button {
  font-size:20px;
  padding:15px 30px;
  border-radius:10px;
}

/* 🎮 GAME */
canvas {
  display:none;
  background:#111;
}

/* 🎮 CONTROLS */
#controls {
  position:fixed;
  bottom:20px;
  width:100%;
  display:none;
}

#controls button {
  font-size:22px;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🎮 MENU -->
<div id="menu">
  <h1>🚗 Streets of Uganda</h1>
  <button onclick="startGame()">▶️ PLAY</button>
</div>

<!-- 🎮 GAME -->
<canvas id="game" width="400" height="600"></canvas>

<!-- 🎮 CONTROLS -->
<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="nitro()">⚡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning = false;
let baseSpeed = 3;
let speed = baseSpeed;
let score = 0;

// 🎵 MUSIC
const music = {
  racing: new Audio("music/racing.mp3"),
  night: new Audio("music/night.mp3"),
  chaos: new Audio("music/chaos.mp3")
};

function playMusic(type){
  for(let m in music){
    music[m].pause();
    music[m].currentTime = 0;
  }
  music[type].loop = true;
  music[type].play();
}

// 🚗 PLAYER
let player = { x:180, y:500 };

// 🚧 OBSTACLES
let obstacles = [];

// 🛣️ ROAD
let roadOffset = 0;

// ⚡ NITRO
function nitro(){
  speed = 9;
  setTimeout(()=> speed = baseSpeed, 2000);
}

// 🎮 CONTROLS
function moveLeft(){ player.x -= 40; }
function moveRight(){ player.x += 40; }

// 🚧 SPAWN
let lanes = [100, 180, 260];

function spawnObstacle(){
  let types = ["car","taxi","boda"];
  obstacles.push({
    x: lanes[Math.floor(Math.random()*lanes.length)],
    y: -60,
    type: types[Math.floor(Math.random()*types.length)]
  });
}

// 🛣️ DRAW ROAD (pseudo 3D feel)
function drawRoad(){
  ctx.fillStyle="#222";
  ctx.fillRect(0,0,400,600);

  ctx.strokeStyle="white";
  ctx.setLineDash([20,20]);

  for(let x=100;x<=300;x+=100){
    for(let i=-40;i<600;i+=40){
      ctx.beginPath();
      ctx.moveTo(x,i+roadOffset);
      ctx.lineTo(x,i+20+roadOffset);
      ctx.stroke();
    }
  }

  ctx.setLineDash([]);
}

// 🚗 PLAYER DRAW
function drawPlayer(){
  ctx.shadowColor="red";
  ctx.shadowBlur=20;

  ctx.fillStyle="red";
  ctx.fillRect(player.x,500,40,60);

  ctx.shadowBlur=0;

  ctx.fillStyle="lightblue";
  ctx.fillRect(player.x+5,510,30,20);
}

// 🚧 OBSTACLES
function drawObstacle(o){
  if(o.type==="car") ctx.fillStyle="blue";
  else if(o.type==="taxi") ctx.fillStyle="yellow";
  else ctx.fillStyle="green";

  ctx.fillRect(o.x,o.y,40,60);
}

// 🚀 START GAME
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  document.getElementById("controls").style.display="block";

  gameRunning=true;
  playMusic("racing");

  setInterval(gameLoop,20);
  setInterval(spawnObstacle,800);
}

// 🎮 GAME LOOP
function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,400,600);

  // motion effect
  roadOffset += speed;
  if(roadOffset>40) roadOffset=0;

  drawRoad();
  drawPlayer();

  obstacles.forEach(o=>{
    o.y += speed;
    drawObstacle(o);

    if(o.y>480 && o.x<player.x+40 && o.x+40>player.x){
      alert("💥 Obodde!");
      location.reload();
    }
  });

  score++;

  // speed fade effect
  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,400,600);

  // random music switch
  if(Math.random()<0.002) playMusic("chaos");
  if(Math.random()<0.001) playMusic("night");
}
</script>

</body>
</html>
