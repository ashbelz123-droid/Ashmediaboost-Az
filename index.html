<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashmediaboost</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-content">
    <div class="logo-circle">A</div>
    <h1>Ashmediaboost</h1>
    <p>Loading your growth engine 🚀</p>
  </div>
</div>

<!-- TOP FAKE ORDER -->
<div id="topBar" class="top-bar"></div>

<!-- HERO -->
<header class="hero">
  <h1 class="brand">Ash<span>media</span>boost 🚀</h1>
  <p class="tagline">Grow Faster • Trusted • Instant Delivery</p>

  <div class="badges">
    <span>🔒 Secure</span>
    <span>💬 WhatsApp Support</span>
    <span>⚡ Fast</span>
  </div>

  <p class="limited">⚡ Limited slots today</p>
  <p id="liveUsers" class="live-users"></p>

  <button onclick="confirmOrder()">🔥 Order via WhatsApp</button>
  <p class="trust-text">🔒 Secure • 💬 Instant Support • ⚡ Fast Delivery</p>
</header>

<!-- ORDER -->
<section class="order" id="order">
  <h2>Place Your Order</h2>

  <select id="platform">
    <option value="instagram">Instagram</option>
    <option value="tiktok">TikTok</option>
    <option value="youtube">YouTube</option>
  </select>

  <select id="type" onchange="updateServiceOptions()">
    <option value="">Select Service</option>
    <option value="followers">Followers</option>
    <option value="likes">Likes</option>
    <option value="views">Views</option>
    <option value="comments">Comments</option>
  </select>

  <div id="serviceOptions"></div>

  <input type="text" id="link" placeholder="Paste your link">
  <input type="number" id="quantity" placeholder="Enter quantity">

  <p id="price">Total: 0 UGX</p>

  <button onclick="confirmOrder()">🔥 Order Now</button>
</section>

<!-- SUPPORT -->
<section class="support">
  <h3>📞 Customer Support</h3>
  <a href="https://wa.me/256740421134" class="support-btn">Chat on WhatsApp</a>
</section>

<!-- FLOAT -->
<a href="https://wa.me/256740421134?text=Hello%20Ashmediaboost%20I%20need%20help%20🚀" class="whatsapp-float">💬</a>

<!-- LIVE BAR -->
<div class="live-bar">
  <div id="liveSlide"></div>
</div>

<div id="popup" class="popup"></div>

<script src="script.js"></script>
</body>
  </html>
