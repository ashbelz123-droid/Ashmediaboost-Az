<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Streets of Uganda</title>
<style>
body { margin:0; background:black; color:white; text-align:center; font-family:Arial; }
canvas { background:#111; display:none; margin:auto; }

#menu {
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(black,#222);
}

button {
  padding:15px;
  font-size:18px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🏃 Streets of Uganda</h1>
  <button onclick="startGame()">▶️ Tandika</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div id="controls" style="display:none;">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let running = false;
let speed = 4;
let score = 0;

// 🎧 SOUND (NO FILES — GENERATED)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, time){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.start();

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time);

  osc.stop(audioCtx.currentTime + time);
}

// 🛣️ LANES
let lanes = [80, 180, 280];
let currentLane = 1;

let player = { x: lanes[currentLane], y:500 };

// 🚧 OBSTACLES
let obstacles = [];

// 🎮 CONTROLS
function moveLeft(){
  if(currentLane > 0){
    currentLane--;
    beep(200,0.1);
  }
}

function moveRight(){
  if(currentLane < 2){
    currentLane++;
    beep(200,0.1);
  }
}

// 🚀 START
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  document.getElementById("controls").style.display="block";

  running = true;
  beep(500,0.2);

  setInterval(loop,20);
  setInterval(spawn,900);
}

// 🚧 SPAWN
function spawn(){
  let types = ["boda","taxi","drum"];
  obstacles.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    type: types[Math.floor(Math.random()*types.length)]
  });
}

// 🎨 DRAW ROAD
let offset = 0;
function drawRoad(){
  ctx.fillStyle="#222";
  ctx.fillRect(0,0,400,600);

  ctx.strokeStyle="white";
  ctx.setLineDash([20,20]);

  for(let x=100;x<=300;x+=100){
    for(let i=-40;i<600;i+=40){
      ctx.beginPath();
      ctx.moveTo(x,i+offset);
      ctx.lineTo(x,i+20+offset);
      ctx.stroke();
    }
  }

  ctx.setLineDash([]);
}

// 🧍 PLAYER
function drawPlayer(){
  player.x += (lanes[currentLane]-player.x)*0.2;

  ctx.fillStyle="red";
  ctx.fillRect(player.x, player.y, 40, 60);

  ctx.fillStyle="lightblue";
  ctx.fillRect(player.x+5, player.y+10, 30, 20);
}

// 🚧 OBSTACLE DRAW
function drawObstacle(o){
  let x = lanes[o.lane];

  let scale = 0.5 + (o.y / 600);

  if(o.type==="boda") ctx.fillStyle="green";
  else if(o.type==="taxi") ctx.fillStyle="yellow";
  else ctx.fillStyle="orange";

  ctx.fillRect(x, o.y, 40*scale, 60*scale);
}

// 🎮 LOOP
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,400,600);

  offset += speed;
  if(offset>40) offset=0;

  drawRoad();
  drawPlayer();

  obstacles.forEach(o=>{
    o.y += speed;
    drawObstacle(o);

    let x = lanes[o.lane];

    if(o.y>480 && x<player.x+40 && x+40>player.x){
      beep(100,0.3);
      alert("💀 Ofudde!");
      location.reload();
    }
  });

  score++;
}
</script>

</body>
</html>
