<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="rocket" id="rocket">🚀</div>
  <h1>Âshmēdìãßòøst</h1>
</div>

<!-- NAV -->
<div class="top-nav">
  <div class="logo">🚀 Âshmēdìãßòøst</div>
</div>

<!-- HERO -->
<header class="hero">
  <h1>Grow Fast 🚀</h1>
  <button onclick="scrollToOrder()">Start Growth</button>
</header>

<!-- JOIN -->
<section class="glass join-box">
  <div class="join-content">
    <div>
      <b>Join WhatsApp</b>
      <p>Get updates & offers</p>
    </div>
    <a href="https://whatsapp.com/channel/0029VbCSFDCBadmaR5Memh16" class="join-btn">Join →</a>
  </div>
</section>

<!-- ORDER -->
<section id="orderSection" class="glass">

<select id="currency" onchange="changeCurrency()">
<option value="UGX">🇺🇬 UGX</option>
<option value="KES">🇰🇪 KES</option>
<option value="NGN">🇳🇬 NGN</option>
<option value="USD">🇺🇸 USD</option>
</select>

<div class="platforms">
  <div class="platform-card active" onclick="selectPlatform(this,'instagram')">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"><p>Instagram</p>
  </div>
  <div class="platform-card" onclick="selectPlatform(this,'tiktok')">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"><p>TikTok</p>
  </div>
  <div class="platform-card" onclick="selectPlatform(this,'facebook')">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"><p>Facebook</p>
  </div>
  <div class="platform-card" onclick="selectPlatform(this,'youtube')">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"><p>YouTube</p>
  </div>
</div>

<select id="type" onchange="updateServiceOptions();calculatePrice()">
<option value="">Select Service</option>
<option value="followers">Followers</option>
<option value="likes">Likes</option>
<option value="views">Views</option>
<option value="subscribers">Subscribers</option>
</select>

<div id="serviceOptions"></div>

<input id="link" placeholder="Paste link">
<p id="linkError"></p>

<input id="quantity" type="number" placeholder="Quantity" oninput="calculatePrice()">

<p id="price">💰 Total: Select options</p>

<button onclick="confirmOrder()">Order via WhatsApp</button>

</section>

<!-- POPUPS -->
<div id="orderPopup"></div>

<script src="script.js"></script>
</body>
</html>
