<!DOCTYPE html>
<html lang="lg">
<head>
<meta charset="UTF-8">
<title>Streets of Uganda</title>
<style>
body { margin:0; background:black; color:white; text-align:center; font-family:Arial; }
canvas { background:#111; display:block; margin:auto; }
button { padding:10px; margin:5px; font-size:16px; }
</style>
</head>
<body>

<h1>🚗 Streets of Uganda</h1>
<button onclick="startGame()">▶️ Tandika</button>
<button onclick="nitro()">⚡ Nitro</button>

<h3>💰 Coins: <span id="coins">0</span> | 🏁 Score: <span id="score">0</span></h3>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning = false;
let baseSpeed = 3;
let speed = baseSpeed;
let coins = 0;
let score = 0;

// 🎵 MUSIC
const music = {
  racing: new Audio("music/racing.mp3"),
  night: new Audio("music/night.mp3"),
  chaos: new Audio("music/chaos.mp3")
};

function playMusic(type){
  for(let m in music){
    music[m].pause();
    music[m].currentTime = 0;
  }
  music[type].loop = true;
  music[type].play();
}

// 🚗 PLAYER
let player = { x:180, y:500, w:40, h:60 };

// 🚧 OBSTACLES
let obstacles = [];

// 🌍 ROAD
let roadOffset = 0;

// ⚡ NITRO
function nitro(){
  speed = 8;
  setTimeout(()=>{ speed = baseSpeed; }, 2000);
}

// 🛣️ ROAD DRAW
function drawRoad(){
  ctx.fillStyle = "#333";
  ctx.fillRect(0,0,400,600);

  // lanes
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.setLineDash([20,20]);

  for(let x=100; x<=300; x+=100){
    for(let i=-40; i<600; i+=40){
      ctx.beginPath();
      ctx.moveTo(x, i + roadOffset);
      ctx.lineTo(x, i+20 + roadOffset);
      ctx.stroke();
    }
  }

  ctx.setLineDash([]);
}

// 🚗 PLAYER DRAW
function drawPlayer(){
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(player.x+5, player.y+5, 40, 60);

  // car
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, 40, 60);

  // glass
  ctx.fillStyle = "lightblue";
  ctx.fillRect(player.x+5, player.y+10, 30, 20);
}

// 🚧 OBSTACLES
function drawObstacle(o){
  if(o.type==="car") ctx.fillStyle="blue";
  else if(o.type==="taxi") ctx.fillStyle="yellow";
  else if(o.type==="boda") ctx.fillStyle="green";
  else ctx.fillStyle="orange";

  ctx.fillRect(o.x,o.y,40,60);
}

// 🎮 CONTROLS
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") player.x-=30;
  if(e.key==="ArrowRight") player.x+=30;
});

// 📱 TOUCH
canvas.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;
  if(x < window.innerWidth/2) player.x -= 30;
  else player.x += 30;
});

// 🚧 SPAWN
function spawnObstacle(){
  let types = ["car","taxi","boda","tuktuk"];
  obstacles.push({
    x: [80,180,280][Math.floor(Math.random()*3)], // lanes
    y: -60,
    type: types[Math.floor(Math.random()*types.length)]
  });
}

// 🚀 START
function startGame(){
  gameRunning = true;
  playMusic("racing");
  setInterval(gameLoop,20);
  setInterval(spawnObstacle,800);
}

// 🎮 LOOP
function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,400,600);

  // speed effect
  roadOffset += speed;
  if(roadOffset > 40) roadOffset = 0;

  drawRoad();
  drawPlayer();

  obstacles.forEach(o=>{
    o.y += speed;
    drawObstacle(o);

    if(o.y>480 && o.x<player.x+40 && o.x+40>player.x){
      alert("💥 Obodde!");
      location.reload();
    }
  });

  // score + coins
  coins += 0.05;
  score += 1;

  document.getElementById("coins").innerText = Math.floor(coins);
  document.getElementById("score").innerText = score;

  // random music change
  if(Math.random()<0.002) playMusic("chaos");
  if(Math.random()<0.001) playMusic("night");
}
</script>

</body>
</html>
