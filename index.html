<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashmediaboost</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="logo">🚀 AshMedia<span>boost</span></div>
</div>

<!-- NAV -->
<div class="top-nav">
  <div class="logo-small">🚀 Ashboost</div>
  <button onclick="scrollToOrder()">Order</button>
</div>

<!-- LIVE BAR -->
<div id="topBar" class="top-bar"></div>

<!-- HERO -->
<header class="hero">
  <div class="logo">🚀 AshMedia<span>boost</span></div>
  <p id="liveUsers"></p>
  <button onclick="scrollToOrder()">🔥 Start Growth</button>
</header>

<!-- JOIN CHANNEL -->
<section class="join glass">
  <p>📢 Join our WhatsApp Channel</p>
  <a href="https://whatsapp.com/channel/0029VbCSFDCBadmaR5Memh16" target="_blank" class="join-btn">Join Now</a>
</section>

<!-- ORDER -->
<section id="orderSection" class="order glass">

<select id="currency" onchange="changeCurrency()">
<option value="UGX">UGX</option>
<option value="KES">KES</option>
<option value="NGN">NGN</option>
<option value="USD">USD</option>
</select>

<div class="platforms">

<div class="platform-card active" onclick="selectPlatform(this,'instagram')">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<p>Instagram</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'tiktok')">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<p>TikTok</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'facebook')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
<p>Facebook</p>
</div>

<div class="platform-card" onclick="selectPlatform(this,'youtube')">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
<p>YouTube</p>
</div>

</div>

<select id="type" onchange="updateServiceOptions();calculatePrice()">
<option value="">Select Service</option>
<option value="followers">👥 Followers</option>
<option value="likes">❤️ Likes</option>
<option value="views">👁 Views</option>
<option value="subscribers">▶️ Subscribers</option>
</select>

<div id="serviceOptions"></div>

<input id="link" placeholder="Paste link">
<input id="quantity" type="number" placeholder="Quantity" oninput="calculatePrice()">

<p id="price">💰 Total: 0</p>

<button onclick="confirmOrder()">🔥 Order via WhatsApp</button>

</section>

<!-- REF -->
<div class="refer-box glass">
<h3>🎁 Refer & Earn</h3>
<p id="refCode"></p>
<button onclick="shareReferral()">Share</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<button onclick="scrollToOrder()">Order</button>
<button onclick="openWhatsApp()">Chat</button>
</div>

<script src="script.js"></script>
</body>
</html>
