<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashmediaboost</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>Ashmediaboost 🚀</h1>
</div>

<!-- TOP BAR -->
<div id="topBar" class="top-bar"></div>

<!-- HERO -->
<section class="hero">
  <h1>🚀 Social Media Growth Platform</h1>
  <p>Grow Instagram, TikTok, YouTube & Facebook fast</p>
  <p id="liveUsers"></p>
  <button onclick="scrollToOrder()">👇 Get Started</button>
</section>

<!-- PLATFORM CARDS -->
<div class="platforms">

<div class="platform-card active" onclick="selectPlatform(this,'instagram')">
📸 Instagram
</div>

<div class="platform-card" onclick="selectPlatform(this,'tiktok')">
🎵 TikTok
</div>

<div class="platform-card" onclick="selectPlatform(this,'youtube')">
▶️ YouTube
</div>

<div class="platform-card" onclick="selectPlatform(this,'facebook')">
📘 Facebook
</div>

</div>

<!-- SERVICES DISPLAY -->
<section class="services">
  <h2 id="platformTitle">📸 Instagram Services</h2>
  <div id="pricePreview"></div>
</section>

<!-- ORDER -->
<section class="order" id="order">

<h2>Place Order</h2>

<select id="type" onchange="updateServiceOptions()">
<option value="">Select Service</option>
<option value="followers">Followers</option>
<option value="likes">Likes</option>
<option value="views">Views</option>
<option value="comments">Comments</option>
<option value="subscribers">Subscribers</option>
</select>

<div id="serviceOptions" class="service-panel"></div>

<input id="link" placeholder="Paste link">
<input id="quantity" type="number" placeholder="Quantity">

<p id="price">Total: 0 UGX</p>
<p id="refNotice"></p>
<p id="progress">🏆 Your Progress: 0/7</p>

<button onclick="confirmOrder()">🔥 Order Now</button>

</section>

<!-- REFERRAL -->
<section class="refer-box">
<h3>🎁 Refer & Earn</h3>
<div id="refCode"></div>
<button onclick="shareReferral()">Share</button>
</section>

<!-- SUPPORT -->
<section class="support">
<h3>💬 Need Help?</h3>
<button onclick="openWhatsApp()">Chat on WhatsApp</button>
</section>

<script src="script.js"></script>
</body>
</html>
