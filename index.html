<!DOCTYPE html>
<html lang="lg">
<head>
<meta charset="UTF-8">
<title>Streets of Uganda - Ghetto Run</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; text-align:center; overflow:hidden; }

#menu, #characters {
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(black,#222);
}

canvas { display:none; background:#111; }

button {
  padding:12px;
  margin:8px;
  font-size:18px;
  border-radius:10px;
}

#controls {
  position:fixed;
  bottom:10px;
  width:100%;
  display:none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🏃 Streets of Uganda</h1>
  <button onclick="openCharacters()">▶️ Tandika</button>
</div>

<!-- CHARACTER SELECT -->
<div id="characters" style="display:none;">
  <h2>Londa Omuzannyi</h2>

  <button onclick="selectCharacter(0)">Omah</button>
  <button onclick="selectCharacter(1)">Emma</button>

  <br><br>
  <button onclick="startGame()">🚀 Start</button>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="600"></canvas>

<!-- CONTROLS -->
<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="jump()">⬆️</button>
  <button onclick="slide()">⬇️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let running = false;

// SOUND
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(f,t){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=f;
  o.start();
  g.gain.setValueAtTime(0.1,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+t);
  o.stop(audioCtx.currentTime+t);
}

// LANES
let lanes=[80,180,280];
let currentLane=1;

// PLAYER
let player={x:lanes[currentLane],y:500};
let isJumping=false, isSliding=false;
let velocityY=0, gravity=0.6, groundY=500;

// CHARACTER SYSTEM
let selectedCharacter=0;
let characters=[
{
 name:"Omah",
 frames:[
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='120'><circle cx='40' cy='25' r='15' fill='#f1c27d'/><rect x='30' y='40' width='20' height='40' fill='red'/><line x1='30' y1='80' x2='20' y2='110' stroke='black' stroke-width='5'/><line x1='50' y1='80' x2='60' y2='110' stroke='black' stroke-width='5'/></svg>",
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='120'><circle cx='40' cy='25' r='15' fill='#f1c27d'/><rect x='30' y='40' width='20' height='40' fill='red'/><line x1='30' y1='80' x2='40' y2='110' stroke='black' stroke-width='5'/><line x1='50' y1='80' x2='40' y2='110' stroke='black' stroke-width='5'/></svg>"
]
},
{
 name:"Emma",
 frames:[
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='120'><circle cx='40' cy='25' r='15' fill='#f1c27d'/><rect x='30' y='40' width='20' height='40' fill='blue'/><line x1='30' y1='80' x2='20' y2='110' stroke='black' stroke-width='5'/><line x1='50' y1='80' x2='60' y2='110' stroke='black' stroke-width='5'/></svg>",
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='120'><circle cx='40' cy='25' r='15' fill='#f1c27d'/><rect x='30' y='40' width='20' height='40' fill='blue'/><line x1='30' y1='80' x2='40' y2='110' stroke='black' stroke-width='5'/><line x1='50' y1='80' x2='40' y2='110' stroke='black' stroke-width='5'/></svg>"
]
}
];

// LOAD FRAMES
let playerFrames=[];
function updateCharacter(){
 playerFrames=[];
 characters[selectedCharacter].frames.forEach(src=>{
   let img=new Image();
   img.src=src;
   playerFrames.push(img);
 });
}

// SELECT
function selectCharacter(i){
 selectedCharacter=i;
 updateCharacter();
 alert("Olonze "+characters[i].name);
}

// MENU
function openCharacters(){
 document.getElementById("menu").style.display="none";
 document.getElementById("characters").style.display="block";
}

// CONTROLS
function moveLeft(){ if(currentLane>0) currentLane--; }
function moveRight(){ if(currentLane<2) currentLane++; }

function jump(){
 if(!isJumping && !isSliding){
   isJumping=true;
   velocityY=-12;
   beep(400,0.1);
 }
}

function slide(){
 if(!isJumping){
   isSliding=true;
   beep(200,0.1);
   setTimeout(()=>isSliding=false,800);
 }
}

// START
function startGame(){
 document.getElementById("characters").style.display="none";
 canvas.style.display="block";
 document.getElementById("controls").style.display="block";

 running=true;
 updateCharacter();

 setInterval(loop,20);
 setInterval(spawn,900);
}

// OBSTACLES
let obstacles=[];
function spawn(){
 let types=["boda","taxi"];
 obstacles.push({
   lane:Math.floor(Math.random()*3),
   y:-60,
   type:types[Math.floor(Math.random()*types.length)]
 });
}

// ROAD
let offset=0;
function drawRoad(){
 ctx.fillStyle="#222";
 ctx.fillRect(0,0,400,600);

 ctx.strokeStyle="white";
 ctx.setLineDash([20,20]);

 for(let x=100;x<=300;x+=100){
  for(let i=-40;i<600;i+=40){
    ctx.beginPath();
    ctx.moveTo(x,i+offset);
    ctx.lineTo(x,i+20+offset);
    ctx.stroke();
  }
 }

 ctx.setLineDash([]);
}

// ANIMATION
let frameIndex=0, frameTimer=0;

// PLAYER DRAW
function drawPlayer(){
 player.x += (lanes[currentLane]-player.x)*0.2;

 if(isJumping){
   player.y+=velocityY;
   velocityY+=gravity;
   if(player.y>=groundY){
     player.y=groundY;
     isJumping=false;
   }
 }

 frameTimer++;
 if(frameTimer>8){
   frameIndex=(frameIndex+1)%playerFrames.length;
   frameTimer=0;
 }

 let h=isSliding?40:80;

 ctx.drawImage(playerFrames[frameIndex],player.x,player.y+(isSliding?40:0),50,h);
}

// OBSTACLE DRAW
function drawObstacle(o){
 let x=lanes[o.lane];
 let scale=0.6+(o.y/600);

 ctx.fillStyle=o.type==="boda"?"green":"yellow";
 ctx.fillRect(x,o.y,40*scale,60*scale);
}

// LOOP
function loop(){
 if(!running) return;

 ctx.clearRect(0,0,400,600);

 offset+=4;
 if(offset>40) offset=0;

 drawRoad();
 drawPlayer();

 obstacles.forEach(o=>{
  o.y+=4;
  drawObstacle(o);

  let x=lanes[o.lane];
  let ph=isSliding?40:80;

  if(o.y>player.y && o.y<player.y+ph && x<player.x+40 && x+40>player.x){
    beep(100,0.3);
    alert("💀 Ofudde!");
    location.reload();
  }
 });
}
</script>

</body>
</html>
